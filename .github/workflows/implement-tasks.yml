name: Task — Issue erstellen und implementieren
# Erkennt neue Ticket-Dateien in docs/tasks/todo/ nach Merge auf main.
# Erstellt ein GitHub Issue und setzt das Label "claude-implement".
# Die Implementierung startet dann via claude-on-labeled.yml.

on:
  push:
    branches: [main]
    paths:
      - 'docs/tasks/todo/*.md'
  workflow_dispatch:
    inputs:
      task_file:
        description: 'Task-Datei (optional). Ohne Angabe: alle offenen Tasks prüfen.'
        required: false
        type: string

concurrency:
  # Per-slug for dispatch (prevents double-click or push+dispatch race for the same file).
  # Push events fall back to commit SHA — each push is independent.
  group: task-implement-${{ inputs.task_file || github.sha }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Detect unimplemented task
        id: detect
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ -n "${{ inputs.task_file }}" ]; then
            TASK_FILES="${{ inputs.task_file }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TASK_FILES=$(find docs/tasks/todo -name '*.md' | sort)
          else
            TASK_FILES=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'docs/tasks/todo/*.md' 2>/dev/null || true)
          fi

          if [ -z "$TASK_FILES" ]; then
            echo "should_implement=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while IFS= read -r TASK_FILE; do
            [ -f "$TASK_FILE" ] || continue
            SLUG=$(basename "$TASK_FILE" .md)

            [ ! -f "docs/tasks/archived/${SLUG}.md" ] || { echo "Skip archived: $SLUG"; continue; }

            BRANCH=$(git ls-remote --heads origin "refs/heads/req/${SLUG}*" | awk '{print $2}' | head -1 || true)
            [ -z "$BRANCH" ] || { echo "Skip: branch exists ($BRANCH)"; continue; }

            PR_COUNT=$(gh pr list --search "req/${SLUG}" --state open --json number --jq 'length' 2>/dev/null || echo "0")
            [ "$PR_COUNT" -eq 0 ] || { echo "Skip: open PR exists"; continue; }

            {
              echo "spec_file=$TASK_FILE"
              echo "slug=$SLUG"
              echo "should_implement=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          done <<< "$TASK_FILES"

          echo "should_implement=false" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Issue
        id: issue
        if: steps.detect.outputs.should_implement == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          SPEC_FILE="${{ steps.detect.outputs.spec_file }}"
          SLUG="${{ steps.detect.outputs.slug }}"

          # Use label-based lookup instead of search to avoid GitHub search index lag.
          EXISTING=$(gh issue list \
            --label "claude-implement" \
            --state open \
            --json number,title \
            --jq "[.[] | select(.title | contains(\"(${SLUG})\" ))] | .[0].number // empty" \
            2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "Issue #${EXISTING} already exists — reusing"
            exit 0
          fi

          TITLE=$(head -5 "$SPEC_FILE" | grep '^#' | head -1 | sed 's/^#\+[[:space:]]*//')
          [ -n "$TITLE" ] || TITLE="$SLUG"

          BODY_FILE=$(mktemp)
          {
            echo "<!-- spec-file:${SPEC_FILE} -->"
            echo "<!-- identifier:${SLUG} -->"
            echo "<!-- branch-prefix:req -->"
            echo ""
            echo "## Spec: \`${SLUG}\`"
            echo ""
            echo "> 🤖 Claude Code Agent implementiert dieses Ticket automatisch."
            echo ""
            echo "---"
            echo ""
            cat "$SPEC_FILE"
            echo ""
            echo "---"
            echo ""
            echo "**Branch:** \`req/${SLUG}\`  "
            echo "**Spec-Datei:** \`${SPEC_FILE}\`"
          } > "$BODY_FILE"

          ISSUE_URL=$(gh issue create \
            --title "req(${SLUG}): ${TITLE}" \
            --body-file "$BODY_FILE" \
            2>&1)
          rm -f "$BODY_FILE"

          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "✓ Issue #${ISSUE_NUMBER} erstellt: $ISSUE_URL"

          gh issue edit "$ISSUE_NUMBER" --add-label "claude-implement"
