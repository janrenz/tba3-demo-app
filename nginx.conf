server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # TBA3-API: Proxy zum Backend (Request vom Server, kein CORS)
    location /tba3-api/ {
        proxy_pass https://apps.indibit.eu/tba3-api/;
        proxy_ssl_server_name on;
        proxy_set_header Host apps.indibit.eu;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # LTI callback + ggf. Mock (Node)
    location ~ ^/(groups|schools|states|lti-callback)(/|$) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # MCP server (Streamable HTTP)
    location /mcp {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA fallback – all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
